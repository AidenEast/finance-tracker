{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-4">Edit Transaction</h4>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form action="{{ url_for('edit_transaction', transaction_id=transaction.id) }}"
                      method="POST">

                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount ($)</label>
                        <input type="number" step="0.01" min="0"
                               name="amount" id="amount"
                               class="form-control"
                               value="{{ transaction.amount }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="type" class="form-label">Type</label>
                        <select name="type" id="type" class="form-select" required>
                            <option value="expense" {{ 'selected' if transaction.type == 'expense' }}>
                                Expense
                            </option>
                            <option value="income" {{ 'selected' if transaction.type == 'income' }}>
                                Income
                            </option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">
                            Description <span class="text-muted">(optional)</span>
                        </label>
                        <input type="text" name="description" id="description"
                               class="form-control"
                               value="{{ transaction.description or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="category_id" class="form-label">
                            Category <span class="text-muted">(optional)</span>
                        </label>
                        <select name="category_id" id="category_id" class="form-select">
                            <option value="">-- No Category --</option>
                            {% for category in categories %}
                                <option value="{{ category.id }}"
                                    {{ 'selected' if transaction.category_id == category.id }}>
                                    {{ category.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" name="date" id="date"
                               class="form-control"
                               value="{{ transaction.date }}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100">
                            Save Changes
                        </button>
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary w-100">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
