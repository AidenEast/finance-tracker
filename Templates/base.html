<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 mb-4">
        <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">💰 Finance Tracker</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('index') }}">Transactions</a>
            <a class="nav-link" href="{{ url_for('budgets') }}">Budgets</a>
            <a class="nav-link btn btn-success text-white px-3"
               href="{{ url_for('add_transaction') }}">+ Add Transaction</a>
        </div>
    </nav>

    <main class="container pb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block scripts %}{% endblock %}

</body>
</html>
